<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Store — G.O.S</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      width: 100%;
      background: #161b22;
      padding: 1rem 2rem;
      border-bottom: 1px solid #30363d;
      text-align: center;
    }
    header h1 { color: #58a6ff; font-size: 1.6rem; }
    header p { font-size: 0.85rem; color: #8b949e; margin-top: 0.25rem; }
    main {
      width: 100%;
      max-width: 720px;
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }
    section {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 1.5rem;
    }
    section h2 { color: #58a6ff; margin-bottom: 1rem; font-size: 1.1rem; }
    label { display: block; margin-bottom: 0.35rem; font-size: 0.9rem; color: #8b949e; }
    input {
      width: 100%;
      padding: 0.5rem 0.75rem;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 0.95rem;
      margin-bottom: 0.75rem;
    }
    button {
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.6rem 1.25rem;
      font-size: 0.95rem;
      cursor: pointer;
    }
    button:hover { background: #2ea043; }
    #qr-img { margin-top: 1rem; max-width: 200px; display: none; }
    #message {
      margin-top: 0.75rem;
      font-size: 0.9rem;
      color: #3fb950;
      min-height: 1.2em;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th, td { padding: 0.5rem 0.75rem; text-align: left; border-bottom: 1px solid #30363d; }
    th { color: #8b949e; }
    td { color: #c9d1d9; }
    #inventory-body tr:last-child td { border-bottom: none; }
    #empty-msg { color: #8b949e; font-size: 0.9rem; text-align: center; padding: 1rem 0; }
  </style>
</head>
<body>
  <header>
    <h1>QR Store 🌐</h1>
    <p>G.O.S — Godworld Logistic Operating System &nbsp;|&nbsp; Humanitarian QR Payment Platform</p>
  </header>

  <main>
    <!-- QR Generator -->
    <section>
      <h2>Generate Store QR Code</h2>
      <label for="qr-url">Target URL (leave blank for this app)</label>
      <input type="url" id="qr-url" placeholder="https://example.com" />
      <button id="gen-qr-btn">Generate QR</button>
      <img id="qr-img" alt="QR Code" />
    </section>

    <!-- Item Log / Credit Issuer -->
    <section>
      <h2>Log Item &amp; Issue Credit</h2>
      <label for="item-name">Item Name *</label>
      <input type="text" id="item-name" placeholder="e.g. Rice (5 lb bag)" required />
      <label for="item-desc">Description</label>
      <input type="text" id="item-desc" placeholder="Optional description" />
      <label for="item-price">Price (USD) *</label>
      <input type="number" id="item-price" min="0" step="0.01" placeholder="0.00" required />
      <label for="item-tip">Tip (USD)</label>
      <input type="number" id="item-tip" min="0" step="0.01" placeholder="0.00" />
      <button id="log-item-btn">Log Item &amp; Issue Credit</button>
      <div id="message"></div>
    </section>

    <!-- Inventory Manifest -->
    <section>
      <h2>Supply Chain Inventory Manifest</h2>
      <button id="refresh-btn" style="margin-bottom:1rem;">Refresh</button>
      <table>
        <thead>
          <tr>
            <th>Item</th>
            <th>Price</th>
            <th>Tip</th>
            <th>Credit</th>
            <th>Logged At</th>
          </tr>
        </thead>
        <tbody id="inventory-body">
          <tr><td colspan="5" id="empty-msg">No items logged yet.</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);

    // Generate QR
    $('gen-qr-btn').addEventListener('click', async () => {
      const url = $('qr-url').value.trim();
      const qs = url ? `?url=${encodeURIComponent(url)}` : '';
      const res = await fetch(`/api/qr${qs}`);
      const data = await res.json();
      const img = $('qr-img');
      img.src = data.qr;
      img.style.display = 'block';
    });

    // Log item
    $('log-item-btn').addEventListener('click', async () => {
      const name = $('item-name').value.trim();
      const price = parseFloat($('item-price').value);
      if (!name || isNaN(price)) {
        $('message').style.color = '#f85149';
        $('message').textContent = 'Item name and price are required.';
        return;
      }
      const res = await fetch('/api/items', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name,
          description: $('item-desc').value.trim(),
          price,
          tip: parseFloat($('item-tip').value) || 0,
        }),
      });
      const item = await res.json();
      if (res.ok) {
        $('message').style.color = '#3fb950';
        $('message').textContent = `✓ Credit issued for "${item.name}" ($${item.price.toFixed(2)})`;
        $('item-name').value = '';
        $('item-desc').value = '';
        $('item-price').value = '';
        $('item-tip').value = '';
        loadInventory();
      } else {
        $('message').style.color = '#f85149';
        $('message').textContent = item.error || 'Error logging item.';
      }
    });

    // Load inventory
    async function loadInventory() {
      const res = await fetch('/api/items');
      const items = await res.json();
      const tbody = $('inventory-body');
      if (!items.length) {
        tbody.innerHTML = '<tr><td colspan="5" id="empty-msg">No items logged yet.</td></tr>';
        return;
      }
      tbody.innerHTML = items.map((it) => `
        <tr>
          <td><strong>${escHtml(it.name)}</strong>${it.description ? `<br><small>${escHtml(it.description)}</small>` : ''}</td>
          <td>$${it.price.toFixed(2)}</td>
          <td>$${it.tip.toFixed(2)}</td>
          <td style="color:#3fb950">${it.creditIssued ? '✓' : '—'}</td>
          <td>${new Date(it.timestamp).toLocaleString()}</td>
        </tr>
      `).join('');
    }

    function escHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    $('refresh-btn').addEventListener('click', loadInventory);
    loadInventory();
  </script>
</body>
</html>
